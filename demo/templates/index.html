<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vector Search Engine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
            color: #333;
        }

        .search-box {
            margin-top: 30px;
        }

        input {
            width: 400px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
        }

        input:focus {
            border-color: #007BFF;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .results {
            width: 60%;
            margin: 40px auto;
            text-align: left;
        }

        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .result-item a {
            font-size: 18px;
            color: #1a0dab;
            text-decoration: none;
        }

        .result-item a:hover {
            text-decoration: underline;
        }

        .score {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .footer {
            margin-top: 50px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🔍 Vector Search Engine</h1>

        <div class="search-box">
            <input type="text" id="query" placeholder="Search for anything...">
            <button onclick="search()">Search</button>
        </div>
    </div>

    <div class="results" id="results"></div>

    <div class="footer">
        Built with TF-IDF Vector Search
    </div>

    <script src="/static/script.js"></script>

</body>
</html>
